name: Update Feeds

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download and process feeds
        run: python aggregator.py

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          TAG_NAME="v$(date -u +%Y%m%d-%H%M%S)"

          gh release create "$TAG_NAME" \
            blocklist.bin \
            --title "Blocklist Update - $TIMESTAMP" \
            --notes "Automated blocklist update from threat intelligence feeds.

          **Files:**
          - \`blocklist.bin\` - Threat intelligence data (binary format)

          **Download:**
          \`\`\`bash
          wget https://github.com/tn3w/IPBlocklist/releases/download/$TAG_NAME/blocklist.bin
          \`\`\`"

      - name: Cleanup old releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASES_JSON=$(gh release list --limit 100 --json tagName,createdAt)
          TAGS=($(echo "$RELEASES_JSON" | jq -r 'sort_by(.createdAt) | .[].tagName'))
          TOTAL=${#TAGS[@]}
          KEEP=3

          if [ "$TOTAL" -le "$KEEP" ]; then
            echo "No releases to delete (total $TOTAL, keeping $KEEP)."
            exit 0
          fi

          DELETE_COUNT=$((TOTAL - KEEP))
          echo "Deleting $DELETE_COUNT old release(s), keeping $KEEP newest."

          for i in $(seq 0 $((DELETE_COUNT - 1))); do
            TAG=${TAGS[$i]}
            echo "Deleting old release: $TAG"
            gh release delete "$TAG" --yes 2>/dev/null || true
            git push --delete origin "$TAG" 2>/dev/null || true
          done
