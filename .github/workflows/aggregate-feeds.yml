name: Update Feeds

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download and process feeds
        run: python aggregator.py

      - name: Commit data to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet && echo "No changes to commit." || \
            git commit -m "chore(data): update threat intelligence feeds [$(date -u +"%Y-%m-%d %H:%M UTC")]"
          git push

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          TAG_NAME="v$(date -u +%Y%m%d-%H%M%S)"

          gh release create "$TAG_NAME" \
            data/blocklist.bin \
            data/attacks.ipset \
            data/malware.ipset \
            data/botnet.ipset \
            data/anonymizer.ipset \
            data/spam.ipset \
            data/compromised.ipset \
            data/infrastructure.ipset \
            --title "Threatkill Update — $TIMESTAMP" \
            --notes "## Automated threat intelligence update

          **Timestamp:** $TIMESTAMP
          **Feeds:** 128 sources processed

          ### Assets

          | File | Description |
          |---|---|
          | \`blocklist.bin\` | Full binary database (all feeds, delta-encoded) |
          | \`attacks.ipset\` | Scanners, brute-force, web attackers |
          | \`malware.ipset\` | Malware C2, exploit hosts, phishing |
          | \`botnet.ipset\` | Botnet command & control nodes |
          | \`anonymizer.ipset\` | Tor nodes, VPN servers, open proxies |
          | \`spam.ipset\` | Spam networks and forum abusers |
          | \`compromised.ipset\` | Compromised and hijacked hosts |
          | \`infrastructure.ipset\` | Datacenters, CDNs, cloud providers |

          ### Quick download

          \`\`\`bash
          BASE=https://github.com/kboykov/Threatkill/releases/latest/download
          wget \$BASE/attacks.ipset
          wget \$BASE/malware.ipset
          wget \$BASE/blocklist.bin
          \`\`\`

          ### Raw file access (always latest)

          \`\`\`bash
          BASE=https://raw.githubusercontent.com/kboykov/Threatkill/master/data
          wget \$BASE/attacks.ipset
          wget \$BASE/malware.ipset
          \`\`\`"

      - name: Cleanup old releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASES_JSON=$(gh release list --limit 100 --json tagName,createdAt)
          TAGS=($(echo "$RELEASES_JSON" | jq -r 'sort_by(.createdAt) | .[].tagName'))
          TOTAL=${#TAGS[@]}
          KEEP=3

          if [ "$TOTAL" -le "$KEEP" ]; then
            echo "No releases to delete (total $TOTAL, keeping $KEEP)."
            exit 0
          fi

          DELETE_COUNT=$((TOTAL - KEEP))
          echo "Deleting $DELETE_COUNT old release(s), keeping $KEEP newest."

          for i in $(seq 0 $((DELETE_COUNT - 1))); do
            TAG=${TAGS[$i]}
            echo "Deleting old release: $TAG"
            gh release delete "$TAG" --yes 2>/dev/null || true
            git push --delete origin "$TAG" 2>/dev/null || true
          done
